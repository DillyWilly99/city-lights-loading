<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-background"></div>
        <div class="loading-content">
            <h1 class="loading-title">To-Do List</h1>
            <p class="loading-subtitle">Powered by City Lights</p>
            <div class="loading-bar">
                <div class="loading-fill" id="loadingFill"></div>
            </div>
            <p class="loading-text" id="loadingText">Loading...</p>
            <button id="musicToggle" class="music-toggle">
                <span id="musicIcon">🔊</span> Music
            </button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="main-app hidden">
        <div class="container">
            <!-- Header -->
            <div class="header">
                <h1>📝 My To-Do List</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>

            <!-- Input Section -->
            <div class="input-section">
                <input 
                    type="text" 
                    id="taskInput" 
                    class="task-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <!-- Stats -->
            <div class="stats">
                <span class="stat-item">Total: <strong id="totalCount">0</strong></span>
                <span class="stat-item">Active: <strong id="activeCount">0</strong></span>
                <span class="stat-item">Completed: <strong id="completedCount">0</strong></span>
            </div>

            <!-- Tasks List -->
            <ul id="taskList" class="task-list"></ul>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <p>No tasks yet. Add one to get started! 🚀</p>
            </div>

            <!-- Clear Completed Button -->
            <button id="clearCompleted" class="clear-btn">Clear Completed</button>

            <!-- App Music Control -->
            <div class="app-music-control">
                <button id="appMusicToggle" class="app-music-btn">
                    <span id="appMusicIcon">🔊</span> Background Music
                </button>
            </div>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="bgMusic" loop>
        <source src="rap-music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
